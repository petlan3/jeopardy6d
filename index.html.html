            --success: #22c55e;
            --danger: #ef4444;
        }

        body {

            background-color: var(--bg-dark); 
            color: #f8fafc; 
            margin: 0; 
            padding: 25px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }

        h1 { 
            font-family: 'Poppins', sans-serif; 
            font-size: 38px; 
            font-weight: 900;
            color: transparent;
            background: linear-gradient(to right, #38bdf8, #facc15);
            -webkit-background-clip: text;
            margin: 0 0 25px 0; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            text-align: center; 
        }
        
        .main-wrapper { display: flex; gap: 30px; width: 1400px; max-width: 100%; }
        .left-content { flex-grow: 1; display: flex; flex-direction: column; align-items: center; }
        
        /* Das Spielfeld-Raster */
        .jeopardy-board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; width: 100%; }
        
        .category-card { 
            background: linear-gradient(135deg, #1e3a8a, #1e40af); 
            border: 2px solid var(--primary); 
            border-radius: 16px; 
            padding: 18px 10px; 
            text-align: center; 
            font-family: 'Poppins', sans-serif; 
            font-size: 18px; 
            font-weight: 700; 
            color: #ffffff; 
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.15);
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 55px; 
        }

        .point-card { 
            background: var(--panel-bg); 
            border: 2px solid #334155; 
            border-radius: 16px; 
            padding: 35px 10px; 
            text-align: center; 
            font-family: 'Poppins', sans-serif; 
            font-size: 46px; 
            font-weight: 900; 
            color: var(--accent); 
            cursor: pointer; 
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, background-color 0.3s ease;
        }
        .point-card:hover { 
            background: #1e293b;
            border-color: var(--accent);
            transform: translateY(-4px);
            box-shadow: 0 10px 20px rgba(250, 204, 21, 0.2);
        }
        .point-card.played { 
            background: #0f172a; 
            border-color: #1e293b; 
            color: #334155; 
            cursor: not-allowed; 
            transform: none; 
            box-shadow: none; 
        }

        /* Rechte Seitenleiste */
        .sidebar-teams { width: 380px; min-width: 380px; display: flex; flex-direction: column; gap: 20px; }
        
        .setup-box { 
            background: var(--panel-bg); 
            border: 2px solid var(--border-color); 
            border-radius: 20px; 
            padding: 20px; 
        }
        .setup-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: 700; font-size: 15px;}
        
        select { 
            font-family: 'Space Grotesk', sans-serif; 
            font-weight: 700; 
            padding: 6px 10px; 
            border: 2px solid #334155; 
            border-radius: 10px; 
            background: var(--bg-dark); 
            color: white;
            font-size: 14px; 
            outline: none;
        }
        
        .team-list-container { display: flex; flex-direction: column; gap: 15px; max-height: 520px; overflow-y: auto; padding-right: 5px; }
        
        .team-card { 
            background: var(--panel-bg); 
            border: 2px solid var(--border-color); 
            border-radius: 20px; 
            padding: 15px; 
        }
        
        .team-title { 
            font-family: 'Poppins', sans-serif; 
            font-weight: 700; 
            font-size: 18px; 
            color: #ffffff; 
            border-bottom: 2px solid var(--border-color); 
            padding-bottom: 8px; 
            margin-bottom: 5px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }

        .team-attempts {
            font-size: 13px;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .score-val { 
            font-family: 'Poppins', sans-serif;
            font-size: 32px; 
            color: var(--success); 
            font-weight: 900; 
            margin-right: 10px; 
        }
        
        .score-control { display: flex; align-items: center; gap: 6px; }
        .score-btn { background: #1e293b; color: white; border: 1px solid #334155; border-radius: 8px; cursor: pointer; font-weight: 700; padding: 4px 10px; font-size: 16px; }

        .team-member { 
            font-size: 16px; 
            padding: 6px 10px; 
            margin: 4px 0; 
            border-radius: 8px; 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: rgba(255,255,255,0.02);
        }
        
        .team-member.is-speaker { 
            background: rgba(34, 197, 94, 0.15); 
            font-weight: 700; 
            border: 1px solid var(--success); 
            color: #4ade80;
        }
        .speaker-badge { font-size: 12px; background: var(--success); color: var(--bg-dark); padding: 2px 6px; border-radius: 6px; font-weight: 700; }
        
        /* Popups */
        .popup-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(7, 10, 19, 0.95); z-index: 1000; justify-content: center; align-items: center; }
        .popup-content { background: var(--panel-bg); border: 2px solid var(--primary); border-radius: 28px; width: 750px; max-width: 90%; padding: 40px; text-align: center; }
        .popup-category { font-family: 'Poppins', sans-serif; font-size: 16px; text-transform: uppercase; color: var(--primary); margin-bottom: 15px; font-weight: 700; }
        .popup-question { font-size: 28px; font-weight: 700; line-height: 1.4; margin-bottom: 30px; color: #ffffff; }
        .popup-answer { display: none; font-size: 24px; font-weight: 700; color: #ffffff; background: var(--bg-dark); border: 2px solid var(--success); padding: 18px; border-radius: 16px; margin-bottom: 30px; }
        
        .popup-team-select { margin: 20px 0; background: var(--bg-dark); border: 2px solid var(--border-color); padding: 15px; border-radius: 16px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .popup-team-select label { font-weight: 700; color: var(--primary); font-size: 16px; }

        .popup-btn { font-family: 'Space Grotesk', sans-serif; font-weight: 700; color: white; border: none; padding: 14px 28px; border-radius: 12px; cursor: pointer; text-transform: uppercase; font-size: 16px; margin: 5px; transition: all 0.2s; }
        .btn-green { background: var(--success); }

</head>

let currentCardElement = null;
let currentPoints = 0;
let finalTeamsData = []; 
let maxAllowedTurnsPerTeam = 3;


function buildBoard() {
    const board = document.getElementById('board');
    board.innerHTML = ""; 
    
    // Holt die aktuell in der Checkbox-Liste markierten Kategorien
    const checkboxes = document.querySelectorAll('#catContainer input:checked');
    const activeCats = Array.from(checkboxes).map(cb => cb.value);

    // Sicherheitsabfrage: Falls nichts gewählt, die ersten 4 aus der Datenliste nehmen
    const finalCats = activeCats.length === 4 ? activeCats : ["NaWi-Raum", "Sinne", "Wirbeltiere", "Welt des Kleinen"];

    // 1. Kategorien-Header zeichnen
    finalCats.forEach(cat => {
        const head = document.createElement('div');
        head.className = "category-card";
        head.innerText = cat;
        board.appendChild(head);
    });

    // 2. Fragen-Raster (100er bis 400er Reihe)
    const punkteStufen = [100, 200, 300, 400];
    punkteStufen.forEach(points => {
        finalCats.forEach(cat => {
            const item = FRAGEN_DATEN.find(f => f.cat === cat && f.points === points);
            const card = document.createElement('div');
            card.className = item ? "point-card" : "point-card played";
            card.innerText = item ? item.points : "-";
            if (item) card.onclick = () => openQuestion(item, card);
            board.appendChild(card);
        });
    });
}

function openQuestion(item, cardElement) {
    if (cardElement.classList.contains('played')) return;
    if (finalTeamsData.length === 0) { alert("Bitte erst Teams auslosen!"); return; }
    
    const randomFrage = item.pool[Math.floor(Math.random() * item.pool.length)];

    currentCardElement = cardElement;
    currentPoints = item.points;
    document.getElementById('popCat').innerText = `${item.cat} • ${item.points} Punkte`;
    
    document.getElementById('popQuest').innerText = randomFrage.q; 
    document.getElementById('popAns').innerText = `Lösung: ${randomFrage.a}`; 
    
    document.getElementById('popAns').style.display = "none";
    document.getElementById('showAnsBtn').style.display = "inline-block";
    document.getElementById('evaluationControls').style.display = "none";
    
    const select = document.getElementById('activeTeamSelect');
    select.innerHTML = "";
    finalTeamsData.forEach((team, idx) => {
        if (team.turnsPlayed < maxAllowedTurnsPerTeam) {
            const opt = document.createElement('option');
            opt.value = idx;
            const speakerName = team.members.find(m => m.id === team.speakerId)?.name || 'Keiner';
            opt.innerText = `${team.name} (${speakerName})`;
            select.appendChild(opt);
        }
    });
    
    document.getElementById('popup').style.display = "flex";
    startTimer(60); 
}

function showAnswer() {
    clearInterval(timerInterval); // Timer anhalten
    document.getElementById('showAnsBtn').style.display = "none";
    document.getElementById('popAns').style.display = "block";
    document.getElementById('evaluationControls').style.display = "block";
}


function evaluateAnswer(isCorrect) {
    // 1. Wenn richtig, Punkte zum Team addieren
    if (isCorrect) {
        const teamIdx = document.getElementById('activeTeamSelect').value;
        changeScore(teamIdx, currentPoints);
        finalTeamsData[teamIdx].turnsPlayed++;
    } else {
        // Falls falsch, trotzdem Versuch zählen (optional)
        const teamIdx = document.getElementById('activeTeamSelect').value;
        finalTeamsData[teamIdx].turnsPlayed++;
    }

    // 2. Karte als "gespielt" markieren
    currentCardElement.classList.add('played');
    currentCardElement.innerText = "-";
    currentCardElement.onclick = null; // Klick deaktivieren

    // 3. Popup schließen
    document.getElementById('popup').style.display = "none";
    
    // Sidebar aktualisieren
    renderTeamsSidebar();
    
    // Prüfen, ob das Spiel zu Ende ist
    checkGameEnd();
}

function checkGameEnd() {
    // 1. Prüfen, ob alle Versuche aufgebraucht sind
    const allTeamsFinished = finalTeamsData.every(team => team.turnsPlayed >= maxAllowedTurnsPerTeam);
    
    // 2. Prüfen, ob noch ungelöste Fragen auf dem Board sind
    // Wir zählen alle point-cards, die NICHT die Klasse 'played' haben
    const remainingQuestions = document.querySelectorAll('.point-card:not(.played)').length;
    
    // Spiel beenden, wenn entweder alle Versuche weg sind ODER keine Fragen mehr da sind
    if (allTeamsFinished || remainingQuestions === 0) {
        let winner = finalTeamsData[0];
        let draw = false;
        
        for (let i = 1; i < finalTeamsData.length; i++) {
            if (finalTeamsData[i].score > winner.score) { 
                winner = finalTeamsData[i]; 
                draw = false; 
            }
            else if (finalTeamsData[i].score === winner.score) { 
                draw = true; 
            }
        }
        
        const textEl = document.getElementById('winnerText');
        const scoreEl = document.getElementById('winnerScore');
        
        if (draw && winner.score > 0) { 
            textEl.innerText = "Gleichstand! Ein tolles Unentschieden! 🤝"; 
            scoreEl.innerText = `Die besten Teams teilen sich den Sieg!`; 
        } else if (winner.score === 0) {
            textEl.innerText = "Das Spiel ist vorbei.";
            scoreEl.innerText = "Leider wurden keine Punkte erzielt.";
        } else { 
            textEl.innerText = `👑 ${winner.name} holt den Gesamtsieg! 👑`; 
            scoreEl.innerText = `Mit stolzen ${winner.score} Punkten!`; 
        }
        
        document.getElementById('winnerPopup').style.display = 'flex';
    }
}

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function violatesRules(team) {
    const names = team.map(s => s.name);
    for (let pair of ANTI_PAARE) if (names.includes(pair[0]) && names.includes(pair[1])) return true;
    return false;
}

function generateTeamsAndSpeakers() {
    const checked = document.querySelectorAll('#catContainer input:checked');
    if (checked.length !== 4) {
        alert(`Bitte wähle exakt 4 Kategorien aus!`);
        return;
    }

    maxAllowedTurnsPerTeam = parseInt(document.getElementById('maxTurnsSelect').value);
    const targetSize = parseInt(document.getElementById('teamSizeSelect').value);
    
    // NEUE LOGIK:
    // Wir berechnen die Anzahl der Teams so, dass wir nah an der Zielgröße bleiben
    // Aber wir lassen den Rest-Schüler lieber in einem Team als ein komplett neues Team zu öffnen
    let totalTeamsCount = Math.round(SCHUELER_LISTE.length / targetSize);
    if (totalTeamsCount < 1) totalTeamsCount = 1;

    let success = false, attempts = 0, generated = [];
    
    while (attempts < 800 && !success) {
        attempts++;
        let alleSchueler = shuffle([...(window.anwesendeSchueler || SCHUELER_LISTE)]);
        let temporaryTeams = Array.from({ length: totalTeamsCount }, () => []);
        
        // Verteilung wie beim Kartenspielen (einer nach dem anderen)
        alleSchueler.forEach((s, i) => {
            temporaryTeams[i % totalTeamsCount].push(s);
        });
        
        if (!temporaryTeams.some(violatesRules)) { 
            generated = temporaryTeams; 
            success = true; 
        }
    }

    // Sprecher-Logik bleibt gleich
    finalTeamsData = generated.map((team, idx) => {
        const randomIndex = Math.floor(Math.random() * team.length);
        return {
            name: `Team ${idx + 1}`, 
            score: 0, 
            turnsPlayed: 0, 
            members: team, 
            speakerId: team.length > 0 ? team[randomIndex].id : null
        };
    });
    
    renderTeamsSidebar(); 
    buildBoard();
}

function setSpeaker(teamIdx, studentId) { finalTeamsData[teamIdx].speakerId = studentId; renderTeamsSidebar(); }

function changeScore(teamIdx, amount) { 
    finalTeamsData[teamIdx].score = Math.max(0, finalTeamsData[teamIdx].score + amount); 
    renderTeamsSidebar(); 
}

function renderTeamsSidebar() {
    const container = document.getElementById('teamList');
    container.innerHTML = "";
    finalTeamsData.forEach((team, tIdx) => {
        const card = document.createElement('div');
        card.className = "team-card";
        card.innerHTML = `<div class="team-title"><span>👥 ${team.name}</span><div class="score-control"><span class="score-val">${team.score}</span><button class="score-btn" onclick="changeScore(${tIdx}, 100)">+</button><button class="score-btn" onclick="changeScore(${tIdx}, -100)">-</button></div></div><div class="team-attempts">🎯 Versuche: ${team.turnsPlayed} / ${maxAllowedTurnsPerTeam}</div>`;
        team.members.forEach(m => {
            const isSpeaker = (m.id === team.speakerId);
            const memRow = document.createElement('div');
            memRow.className = `team-member ${isSpeaker ? 'is-speaker' : ''}`;
            memRow.innerHTML = `<span>👤 ${m.name}</span> ${isSpeaker ? '<span class="speaker-badge">👑 Sprecher</span>' : ''}`;
            memRow.onclick = () => setSpeaker(tIdx, m.id);
            card.appendChild(memRow);
        });
        container.appendChild(card);
    });
}

function startSpiel() {
    // 1. Anwesende Schüler filtern
    const checkedIds = Array.from(document.querySelectorAll('.student-cb:checked')).map(cb => parseInt(cb.value));
    window.anwesendeSchueler = SCHUELER_LISTE.filter(s => checkedIds.includes(s.id));
    
    // 2. Startbildschirm ausblenden
    document.getElementById('startScreen').style.display = "none";
    
    // 3. Teams auslosen/Brett initialisieren
    generateTeamsAndSpeakers();
}

window.onload = function() {
    initCategorySelection();
    
    const listDiv = document.getElementById('attendanceList');
    SCHUELER_LISTE.forEach(s => {
        const div = document.createElement('div');
        div.style = "padding: 8px; color: white; display: flex; align-items: center; gap: 10px; cursor: pointer;";
        div.innerHTML = `<input type="checkbox" checked value="${s.id}" class="student-cb"> ${s.name}`;
        div.onclick = (e) => { if(e.target.tagName !== 'INPUT') div.querySelector('input').click(); };
        listDiv.appendChild(div);
    });
};

function initCategorySelection() {
    const container = document.getElementById('catContainer');
    container.innerHTML = "";
    // Kategorien aus den Daten extrahieren
    const uniqueCats = [...new Set(FRAGEN_DATEN.map(f => f.cat))];
    
    uniqueCats.forEach((cat, index) => {
        const label = document.createElement('label');
        label.style = "font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 8px; padding: 4px; background: #1e293b; border-radius: 6px; color: white;";
        
        const checkbox = document.createElement('input');
        checkbox.type = "checkbox";
        checkbox.value = cat;
        
        // Vorauswahl der ersten 4 Kategorien
        if (index < 4) checkbox.checked = true;

        // Sicherstellen, dass nur 4 gewählt werden können
        checkbox.onchange = () => {
            const checked = document.querySelectorAll('#catContainer input:checked');
            if (checked.length > 4) {
                checkbox.checked = false;
                checkbox.parentElement.style.border = "1px solid #ef4444"; 
                setTimeout(() => checkbox.parentElement.style.border = "none", 500);
            }
        };

        label.appendChild(checkbox);
        label.append(" " + cat);
        container.appendChild(label);
    });
}

let timerInterval;

function startTimer(duration) {
    let timer = duration;
    const display = document.getElementById('timerDisplay');
    display.innerText = timer;
    
    clearInterval(timerInterval); 
    
    timerInterval = setInterval(function () {
        timer--;
        display.innerText = timer;
        if (timer <= 0) {
            clearInterval(timerInterval);
            display.innerText = "Zeit abgelaufen! ⏰";
        }
    }, 1000);
}

window.onload = function() {
    // 1. Kategorien-Auswahl initiieren
    initCategorySelection();
    
    // 2. Schüler für den Startbildschirm auflisten
    const listDiv = document.getElementById('attendanceList');
    SCHUELER_LISTE.forEach(s => {
        const div = document.createElement('div');
        div.style = "padding: 8px; color: white; display: flex; align-items: center; gap: 10px; cursor: pointer;";
        div.innerHTML = `<input type="checkbox" checked value="${s.id}" class="student-cb"> ${s.name}`;
        
        // Klick auf das Div aktiviert/deaktiviert die Checkbox
        div.onclick = (e) => { 
            if(e.target.tagName !== 'INPUT') {
                const cb = div.querySelector('input');
                cb.checked = !cb.checked;
            }
        };
        listDiv.appendChild(div);
    });
};
